<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Monitor</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell" data-expanded="true">
      <header class="popup-header">
        <div class="brand">
          <span class="brand-icon" aria-hidden="true">▣</span>
          <h1>System Monitor</h1>
        </div>
        <div class="header-meta">
          <span id="last-updated">Last updated --:--:--</span>
          <button class="icon-button" type="button" aria-label="More options">⋮</button>
        </div>
      </header>

      <section class="ticker" aria-label="System metrics">
        <div id="ticker-content" class="ticker-content"></div>
      </section>

      <section id="details-panel" class="details-panel" aria-label="Metric details"></section>

      <section id="settings-panel" class="settings-panel" aria-label="Settings" hidden>
        <label class="setting-row" for="refresh-interval">
          <span>
            <strong>Refresh interval</strong>
            <small>Auto updates while this popup is open</small>
          </span>
          <select id="refresh-interval">
            <option value="1000">1s</option>
            <option value="2000">2s</option>
            <option value="5000">5s</option>
          </select>
        </label>
        <label class="setting-row setting-check" for="open-expanded">
          <span>
            <strong>Open expanded</strong>
            <small>Show detail cards by default</small>
          </span>
          <input id="open-expanded" type="checkbox" checked />
        </label>
      </section>

      <footer class="actions">
        <button id="refresh-button" type="button">↻ <span>Refresh</span></button>
        <button id="details-button" type="button" aria-expanded="true">▥ <span>Compact</span></button>
        <button id="settings-button" type="button">⚙ <span>Settings</span></button>
      </footer>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
